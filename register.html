    <h1 class="coleccionIndex">Registro</h1>
    <form class="fClass" action="./home.html" method="post">
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>
        </div>
        <div>
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" required>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div>
            <label for="confirm_password">Confirmar Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        <div>
            <label for="terms">
                <input type="checkbox" id="terms" name="terms" required>
                Acepto los términos y condiciones
            </label>
        </div>
        <button class="registerbotton" type="submit">Register</button>
        <button class="registerbotton" type="button" onclick="window.location.href='./login.html'">Tengo cuenta</button>
        </div>
    </form>
